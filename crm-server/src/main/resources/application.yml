server:
  port: 8080

spring:
  application:
    name: tour-client-crm
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${CRM_DB_URL:jdbc:mysql://localhost:3306/tour_client_crm?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_0900_ai_ci&serverTimezone=Asia/Shanghai}
    username: ${CRM_DB_USERNAME:root}
    password: ${CRM_DB_PASSWORD:root}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  web:
    resources:
      add-mappings: true
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

app:
  upload-dir: ${CRM_UPLOAD_DIR:uploads}
  jwt-secret: ${CRM_JWT_SECRET:change-this-secret-to-a-long-random-value}
  settings-crypto-key: ${CRM_SETTINGS_CRYPTO_KEY:}
  jwt-expiration-minutes: ${CRM_JWT_EXPIRATION_MINUTES:1440}
  auth:
    single-login: ${CRM_SINGLE_LOGIN:false}
